<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    
    <h1 id="title">Guess the Number</h1>
    <section id="game">
    <div id="instructions">I have selected a number between 1 and 100. Can you guess it?</div>
    <input type="number" id="guess" placeholder="Enter your guess" min="1" max="100">
    <div id="btns">
    <button id="submit">Submit Guess</button>
    <button id="new_n"> New Number </button>
    </div>
    <h1 id="result"> New number generated! Start guessing. </h1>
</section>
 <script src="script.js"></script>
</body>

</html>
